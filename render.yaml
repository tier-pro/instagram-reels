services:
  - type: web
    name: instareels
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 3000
      - key: INSTAGRAM_COOKIE
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: NODE_ENV
        value: production
